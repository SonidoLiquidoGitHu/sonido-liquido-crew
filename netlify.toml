# ===========================================
# SONIDO LIQUIDO CREW - NETLIFY CONFIGURATION
# ===========================================
# For Next.js 13.5+, Netlify uses the OpenNext adapter automatically.
# Most settings are auto-configured - keep this file minimal.

# Netlify Image CDN - Dropbox excluded to prevent caching issues
[images]
  remote_images = [
    "https://source.unsplash.com/.*",
    "https://images.unsplash.com/.*",
    "https://ext.same-assets.com/.*",
    "https://ugc.same-assets.com/.*",
    "https://i.scdn.co/.*",
    "https://mosaic.scdn.co/.*",
    "https://image-cdn-fa.spotifycdn.com/.*",
    "https://image-cdn-ak.spotifycdn.com/.*",
    "https://wrapped-images.spotifycdn.com/.*",
    "https://seeded-session-images.scdn.co/.*",
    "https://lineup-images.scdn.co/.*",
    "https://daily-mix.scdn.co/.*",
    "https://newjams-images.scdn.co/.*",
    "https://thisis-images.scdn.co/.*",
    "https://t.scdn.co/.*",
    "https://img.youtube.com/.*",
    "https://i.ytimg.com/.*",
    "https://yt3.ggpht.com/.*",
    "https://yt3.googleusercontent.com/.*",
    "https://placehold.co/.*"
  ]

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NPM_FLAGS = "--legacy-peer-deps"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["music-metadata-browser", "@libsql/client"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ===========================================
# REQUIRED ENVIRONMENT VARIABLES (set in Netlify Dashboard):
# ===========================================
# - DATABASE_URL (Turso database URL)
# - DATABASE_AUTH_TOKEN (Turso auth token)
# - SPOTIFY_CLIENT_ID (optional, for Spotify sync)
# - SPOTIFY_CLIENT_SECRET (optional, for Spotify sync)
# - YOUTUBE_API_KEY (required for roster videos sync)
# ===========================================
